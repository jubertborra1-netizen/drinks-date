<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Toasty Invitation 🍸</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            /* A dreamy twilight gradient */
            background: linear-gradient(135deg, #fceaff 0%, #9092ff 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            text-align: center;
        }
        .container { 
            padding: 30px; 
            z-index: 10; 
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        h1 { color: #4a4e69; font-size: 2rem; margin-bottom: 20px; line-height: 1.4; }
        .gif-container img { 
            width: 200px; 
            border-radius: 20px; 
            margin-bottom: 20px; 
        }
        .btn-group { 
            display: flex; 
            gap: 20px; 
            justify-content: center; 
            position: relative; 
            min-height: 60px; 
            margin-top: 20px;
        }
        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        #yesBtn { 
            background-color: #6c5ce7; 
            color: white; 
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4); 
        }
        #yesBtn:hover { transform: scale(1.05); }
        #noBtn { background-color: #ffffff; color: #4a4e69; }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div class="gif-container">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHIwdW9qZndpbm55NHRreGZ3Ynp0Z3h4ZzRndHh4ZzRndHh4ZzRndHcmZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PXM/3o7TKoWXlo3M1nKSky/giphy.gif" alt="Cheers GIF">
        </div>
        <h1 id="questionText">I’d love to take you out for drinks. <br> Are you free this week? 🍹</h1>
        
        <div class="btn-group">
            <button id="yesBtn" onclick="celebrate()">I'm down! ✨</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="areYouSure()">I'm busy</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const questionText = document.getElementById('questionText');

        // The button "runs away" when she tries to click it
        function moveButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function areYouSure() {
            alert("Wait, are you sure? 🥺");
            alert("The cocktails are on me! 🍸");
            questionText.innerText = "Please say yes? One drink! 🥂";
        }

        // Final screen
        function celebrate() {
            document.getElementById('mainContainer').innerHTML = `
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExem5icm80bm55NHRreGZ3Ynp0Z3h4ZzRndHh4ZzRndHh4ZzRndHcmZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PXM/l41lTfuxV5RdxOlwY/giphy.gif" style="width:200px;">
                <h1 style="color: #4a4e69; margin-top: 20px; font-size: 1.8rem;">
                    Cheers! 🥂 <br>
                    Text me when you're free and we'll pick a spot. <br>
                    Can't wait! ❤️
                </h1>
            `;
        }
    </script>
</body>
</html>
